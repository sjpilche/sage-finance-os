databases:
  - name: sage-finance-db
    plan: starter
    databaseName: sage_finance
    user: sage
    postgresMajorVersion: 16

services:
  - type: web
    name: sage-finance-api
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sage-finance-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: sage-finance-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: RUN_MIGRATIONS
        value: "true"
      - key: API_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "https://*.netlify.app,http://localhost:3004"
    healthCheckPath: /health
